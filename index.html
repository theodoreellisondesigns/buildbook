<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Build Book — Theodore Ellison Designs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ────────────────────────────────────────────────────────────────
   THE BUILD BOOK — Theodore Ellison Designs
   Internal product recipe catalog
   ──────────────────────────────────────────────────────────────── */

:root {
  --muir: #1B2838;
  --sequoia: #5C3D2E;
  --arroyo: #D4793A;
  --farallon: #2A7A6E;
  --pearl: #FAF8F5;
  --mojave: #E8DFD0;
  --ink: #1B2838;
  --ink-soft: #4A5562;
  --ink-faint: #8A8F96;
  --line: #D9D2C5;
  --line-soft: #ECE6D8;
  --leaded: #2A7A6E;
  --leaded-soft: #DCEAE7;
  --mosaic: #D4793A;
  --mosaic-soft: #F4E2D2;
  --bespoke: #5C3D2E;
  --saving: #B88A3E;
  --saved: #2A7A6E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--pearl);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: 15px; color: var(--ink); }

/* ── Layout ── */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--muir);
  color: var(--pearl);
  padding: 28px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.brand {
  padding: 0 24px 28px;
  border-bottom: 1px solid rgba(250, 248, 245, 0.1);
  margin-bottom: 20px;
}
.brand-title {
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.brand-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(250, 248, 245, 0.55);
}

.nav-section {
  padding: 0 12px;
  margin-bottom: 22px;
}
.nav-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(250, 248, 245, 0.45);
  padding: 0 12px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-radius: 6px;
  color: rgba(250, 248, 245, 0.82);
  font-size: 14px;
  cursor: pointer;
  background: transparent;
  border: none;
  width: 100%;
  text-align: left;
  margin-bottom: 1px;
  transition: background 0.12s;
}
.nav-item:hover { background: rgba(250, 248, 245, 0.06); color: var(--pearl); }
.nav-item.active { background: rgba(250, 248, 245, 0.1); color: var(--pearl); font-weight: 500; }
.nav-item .count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(250, 248, 245, 0.5);
}

.sidebar-foot {
  margin-top: auto;
  padding: 16px 24px 0;
  border-top: 1px solid rgba(250, 248, 245, 0.1);
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  color: rgba(250, 248, 245, 0.45);
  display: flex;
  align-items: center;
  gap: 8px;
}
.save-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(250, 248, 245, 0.3);
  transition: background 0.2s;
}
.save-dot.saving { background: var(--saving); animation: pulse 1.2s ease-in-out infinite; }
.save-dot.saved { background: var(--saved); }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

/* ── Main area ── */
.main {
  padding: 32px 44px 64px;
  max-width: 1200px;
  width: 100%;
}

.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 28px;
  gap: 24px;
}
.page-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.page-title {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.page-actions { display: flex; gap: 10px; flex-shrink: 0; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 16px;
  border-radius: 6px;
  font-size: 13.5px;
  font-weight: 500;
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  transition: all 0.12s;
}
.btn:hover { border-color: var(--ink-soft); }
.btn-primary { background: var(--muir); color: var(--pearl); border-color: var(--muir); }
.btn-primary:hover { background: #0F1A26; border-color: #0F1A26; }
.btn-danger { color: #9C3434; border-color: #E5C9C9; }
.btn-danger:hover { background: #F9E8E8; border-color: #C97070; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--ink-soft); }
.btn-ghost:hover { background: var(--mojave); color: var(--ink); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ── Filters ── */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 500;
  background: white;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.12s;
}
.chip:hover { border-color: var(--ink-soft); }
.chip.active {
  background: var(--muir);
  color: var(--pearl);
  border-color: var(--muir);
}
.chip.active.leaded { background: var(--leaded); border-color: var(--leaded); }
.chip.active.mosaic { background: var(--mosaic); border-color: var(--mosaic); }
.chip-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  opacity: 0.7;
}

.search {
  padding: 8px 14px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: white;
  width: 280px;
  font-size: 14px;
}
.search:focus { outline: none; border-color: var(--ink-soft); }

/* ── Cards / grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
}
.card:hover {
  border-color: var(--ink-soft);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(27, 40, 56, 0.06);
}
.card-image {
  aspect-ratio: 4 / 3;
  background: var(--mojave);
  background-size: cover;
  background-position: center;
  position: relative;
}
.card-image.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-faint);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.card-tag {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: rgba(27, 40, 56, 0.85);
  color: var(--pearl);
  backdrop-filter: blur(4px);
}
.card-tag.leaded { background: rgba(42, 122, 110, 0.92); }
.card-tag.mosaic { background: rgba(212, 121, 58, 0.92); }
.card-body {
  padding: 14px 14px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card-title {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.3;
}
.card-meta {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-faint);
}
.empty-state h3 {
  font-size: 17px;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.empty-state p { font-size: 14px; }

/* ── Forms ── */
.form-container {
  background: white;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 32px;
  margin-bottom: 24px;
}
.form-section {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line-soft);
}
.form-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.form-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  margin-bottom: 16px;
}
.form-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  margin-bottom: 16px;
  align-items: start;
}
.form-row:last-child { margin-bottom: 0; }
.form-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  padding-top: 9px;
}
.form-label .req { color: var(--arroyo); margin-left: 2px; }
.form-hint {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 3px;
  line-height: 1.4;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 5px;
  background: white;
  font-size: 14px;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--ink-soft);
}
.form-textarea { resize: vertical; min-height: 70px; }

.checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.check-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  border-radius: 4px;
  border: 1px solid var(--line);
  background: white;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.12s;
}
.check-pill:hover { border-color: var(--ink-soft); }
.check-pill.checked {
  background: var(--muir);
  color: var(--pearl);
  border-color: var(--muir);
}

/* Image picker */
.image-picker {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.image-thumb {
  width: 96px;
  height: 96px;
  border-radius: 6px;
  border: 1px solid var(--line);
  background: var(--mojave);
  background-size: cover;
  background-position: center;
  position: relative;
  overflow: hidden;
}
.image-thumb .remove {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(27, 40, 56, 0.8);
  color: var(--pearl);
  border: none;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.image-thumb .primary-badge {
  position: absolute;
  bottom: 4px;
  left: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: rgba(42, 122, 110, 0.95);
  color: var(--pearl);
  padding: 2px 6px;
  border-radius: 3px;
  pointer-events: none;
}
.image-thumb .set-primary {
  position: absolute;
  bottom: 4px;
  left: 4px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(27, 40, 56, 0.7);
  color: var(--pearl);
  border: none;
  cursor: pointer;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.12s;
}
.image-thumb:hover .set-primary { opacity: 1; }
.image-thumb .set-primary:hover { background: rgba(42, 122, 110, 0.92); }
.image-upload {
  width: 96px;
  height: 96px;
  border-radius: 6px;
  border: 1.5px dashed var(--line);
  background: var(--pearl);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink-faint);
  font-size: 11px;
  text-align: center;
  transition: all 0.12s;
  gap: 4px;
}
.image-upload:hover { border-color: var(--ink-soft); color: var(--ink-soft); background: white; }
.image-upload input { display: none; }
.image-upload.uploading { opacity: 0.5; pointer-events: none; }

/* Glass picker (multi-select with thumbnails) */
.refs-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ref-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px 8px 8px;
  border-radius: 6px;
  background: var(--pearl);
  border: 1px solid var(--line-soft);
}
.ref-row .ref-thumb {
  width: 40px;
  height: 40px;
  border-radius: 4px;
  background: var(--mojave) center/cover;
  flex-shrink: 0;
}
.ref-row .ref-name {
  flex: 1;
  font-size: 14px;
}
.ref-row .ref-code {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
}

/* Element builder */
.element-block {
  background: var(--pearl);
  border: 1px solid var(--line-soft);
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 12px;
}
.element-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.element-name {
  font-weight: 500;
  font-size: 14px;
}
.slot-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 16px;
  align-items: center;
  padding: 6px 0;
}
.slot-name {
  font-family: 'DM Mono', monospace;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
}

/* ── Detail view ── */
.detail {
  background: white;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 36px;
  max-width: 900px;
}
.detail-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line-soft);
}
.detail-title { font-size: 26px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 6px; }
.detail-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  margin-bottom: 4px;
}
.spec-grid {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 14px 24px;
  margin-bottom: 24px;
}
.spec-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  padding-top: 4px;
}
.spec-value {
  font-size: 14.5px;
  line-height: 1.5;
}
.ref-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.ref-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 9px 4px 4px;
  border-radius: 4px;
  background: var(--pearl);
  border: 1px solid var(--line-soft);
  font-size: 13px;
}
.ref-chip-thumb {
  width: 24px;
  height: 24px;
  border-radius: 3px;
  background: var(--mojave) center/cover;
}
.detail-gallery {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.detail-gallery img {
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--line);
}

/* ── Modal / setup ── */
.modal-back {
  position: fixed;
  inset: 0;
  background: rgba(27, 40, 56, 0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal {
  background: var(--pearl);
  border-radius: 10px;
  max-width: 540px;
  width: 100%;
  padding: 36px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h2 {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.modal-sub {
  color: var(--ink-soft);
  font-size: 14px;
  margin-bottom: 24px;
  line-height: 1.5;
}
.modal .form-row { grid-template-columns: 1fr; gap: 6px; }
.modal .form-label { padding-top: 0; }
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
}

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--muir);
  color: var(--pearl);
  padding: 12px 18px;
  border-radius: 6px;
  font-size: 13.5px;
  z-index: 200;
  box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: #8C2929; }

/* ── Print ── */
@media print {
  .sidebar, .page-actions, .filter-bar { display: none !important; }
  .app { display: block; }
  .main { padding: 0; max-width: none; }
  .detail { border: none; padding: 0; }
  body { background: white; }
  .card { break-inside: avoid; }
}
</style>
</head>
<body>

<div id="app" class="app" style="display: none;">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-title">The Build Book</div>
      <div class="brand-sub">Theodore Ellison Designs</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Browse</div>
      <button class="nav-item" data-route="products/all">All products <span class="count" id="count-all">0</span></button>
      <button class="nav-item" data-route="products/leaded"><span>Leaded glass</span> <span class="count" id="count-leaded">0</span></button>
      <button class="nav-item" data-route="products/mosaic"><span>Mosaic</span> <span class="count" id="count-mosaic">0</span></button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Build</div>
      <button class="nav-item" data-route="build">New product</button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Catalogs</div>
      <button class="nav-item" data-route="catalog/patterns">Patterns <span class="count" id="count-patterns">0</span></button>
      <button class="nav-item" data-route="catalog/glass">Glass <span class="count" id="count-glass">0</span></button>
      <button class="nav-item" data-route="catalog/colorways">Colorways <span class="count" id="count-colorways">0</span></button>
      <button class="nav-item" data-route="catalog/elements">Elements <span class="count" id="count-elements">0</span></button>
      <button class="nav-item" data-route="catalog/grout">Grout <span class="count" id="count-grout">0</span></button>
      <button class="nav-item" data-route="catalog/metals">Metal finishes <span class="count" id="count-metals">0</span></button>
      <button class="nav-item" data-route="catalog/pips">Pips <span class="count" id="count-pips">0</span></button>
      <button class="nav-item" data-route="catalog/came">Came profiles <span class="count" id="count-came">0</span></button>
      <button class="nav-item" data-route="catalog/rondel-types">Rondel types <span class="count" id="count-rondel-types">0</span></button>
      <button class="nav-item" data-route="catalog/finishes">Mosaic finishes <span class="count" id="count-finishes">0</span></button>
    </div>

    <div class="nav-section">
      <div class="nav-label">Settings</div>
      <button class="nav-item" data-route="settings">Connection</button>
    </div>

    <div class="sidebar-foot">
      <div class="save-dot" id="save-dot"></div>
      <div id="save-status">Idle</div>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<div id="toast" class="toast"></div>

<script>
/* ────────────────────────────────────────────────────────────────
   STATE & STORAGE
   ──────────────────────────────────────────────────────────────── */

const CONFIG_KEY = 'ted-build-book-config';
const KEYS = [
  'ted-build-glass', 'ted-build-grout', 'ted-build-metals',
  'ted-build-pips', 'ted-build-finishes', 'ted-build-came',
  'ted-build-colorways', 'ted-build-rondel-types',
  'ted-build-patterns', 'ted-build-elements', 'ted-build-products'
];

const STATE = {
  config: null,        // { execUrl, folderId, author }
  data: {},            // keyed by storage key, each is an array
  route: 'products/all',
  filter: { type: 'all', classification: 'all', search: '' },
  pollTimer: null,
  lastLocalSaveAt: 0,  // for 25s grace period
  saveQueue: 0,
};

/* ── Local cache helpers ── */
function loadConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || 'null'); }
  catch (e) { return null; }
}
function saveConfig(c) { localStorage.setItem(CONFIG_KEY, JSON.stringify(c)); }
function clearConfig() { localStorage.removeItem(CONFIG_KEY); }

/* ── ID generation ── */
function newId(prefix) {
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;
}

/* ── Save status indicator ── */
function setSaveStatus(state, msg) {
  const dot = document.getElementById('save-dot');
  const txt = document.getElementById('save-status');
  dot.className = 'save-dot ' + (state || '');
  txt.textContent = msg || (state === 'saving' ? 'Saving…' : state === 'saved' ? 'Saved' : 'Idle');
  if (state === 'saved') {
    setTimeout(() => {
      if (STATE.saveQueue === 0) setSaveStatus('', 'Idle');
    }, 2200);
  }
}

/* ── Toast ── */
function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

/* ────────────────────────────────────────────────────────────────
   BACKEND COMMUNICATION (JSONP read, no-cors write)
   ──────────────────────────────────────────────────────────────── */

function jsonpGet(params) {
  return new Promise((resolve, reject) => {
    if (!STATE.config || !STATE.config.execUrl) {
      reject(new Error('No exec URL configured'));
      return;
    }
    const cbName = '_jsonp_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Request timed out'));
    }, 20000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
    }
    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };
    const qs = new URLSearchParams({ ...params, callback: cbName }).toString();
    script.src = STATE.config.execUrl + '?' + qs;
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    document.body.appendChild(script);
  });
}

async function postWrite(payload) {
  if (!STATE.config || !STATE.config.execUrl) throw new Error('No exec URL configured');
  STATE.saveQueue++;
  setSaveStatus('saving');
  try {
    // Writes go via JSONP GET because some Apps Script deployments (especially
    // Workspace ones) silently drop POST bodies during redirect. GET is reliable.
    // POST is still used for image uploads because the body is too large for a URL.
    if (payload.action === 'set') {
      const res = await jsonpGet({ action: 'set', key: payload.key, value: payload.value });
      if (res && res.ok === false) throw new Error(res.error || 'Write failed');
    } else {
      // uploadImage and any other POST-only action
      await fetch(STATE.config.execUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
      });
    }
    STATE.lastLocalSaveAt = Date.now();
  } finally {
    STATE.saveQueue--;
    setSaveStatus(STATE.saveQueue === 0 ? 'saved' : 'saving');
  }
}

async function saveKey(key, value) {
  STATE.data[key] = value;
  await postWrite({ action: 'set', key, value: JSON.stringify(value) });
  renderCounts();
  // Re-render current view if it's related
  rerenderRoute();
}

async function fetchAll() {
  const result = await jsonpGet({ action: 'getAll' });
  if (result && result.ok && result.data) {
    for (const k of KEYS) {
      try {
        STATE.data[k] = result.data[k] ? JSON.parse(result.data[k]) : [];
      } catch (e) { STATE.data[k] = []; }
      if (!Array.isArray(STATE.data[k])) STATE.data[k] = [];
    }
  } else {
    for (const k of KEYS) if (!STATE.data[k]) STATE.data[k] = [];
  }
}

async function uploadImage(file) {
  if (!STATE.config || !STATE.config.folderId) throw new Error('No Drive folder configured');
  const base64 = await fileToBase64(file);
  // Image upload uses POST + form-encoded body so Apps Script can read it.
  // We expect the backend to return a JSON response we read via a follow-up read.
  // Strategy: POST with a unique uploadId, backend stores result in cache by id,
  // then we poll a quick JSONP read for the result.
  const uploadId = newId('upl');
  await postWrite({
    action: 'uploadImage',
    uploadId,
    filename: file.name,
    mimeType: file.type,
    data: base64,
  });
  // Poll for the result (up to ~10s)
  for (let i = 0; i < 20; i++) {
    await new Promise(r => setTimeout(r, 500));
    const res = await jsonpGet({ action: 'getUpload', uploadId });
    if (res && res.ok && res.url) return res.url;
    if (res && res.error) throw new Error(res.error);
  }
  throw new Error('Upload timed out');
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const base64 = result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ────────────────────────────────────────────────────────────────
   POLLING (10s with 25s grace)
   ──────────────────────────────────────────────────────────────── */
function startPolling() {
  if (STATE.pollTimer) clearInterval(STATE.pollTimer);
  STATE.pollTimer = setInterval(async () => {
    // Skip polling for 25s after a local save (avoid clobbering)
    if (Date.now() - STATE.lastLocalSaveAt < 25000) return;
    if (STATE.saveQueue > 0) return;
    try {
      await fetchAll();
      renderCounts();
      rerenderRoute();
    } catch (e) { /* silent */ }
  }, 10000);
}

/* ────────────────────────────────────────────────────────────────
   ROUTING
   ──────────────────────────────────────────────────────────────── */

function navigate(route) {
  STATE.route = route;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.route === route ||
      (route.startsWith(el.dataset.route + '/') && el.dataset.route !== 'products/all'));
  });
  // Ensure active flag for parent product routes
  if (route.startsWith('products/')) {
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === route);
    });
  } else if (route.startsWith('build')) {
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === 'build');
    });
  } else {
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === route);
    });
  }
  rerenderRoute();
}

function rerenderRoute() {
  const r = STATE.route;
  if (r.startsWith('products/')) renderProducts(r.split('/')[1]);
  else if (r === 'build') renderBuilder(null);
  else if (r.startsWith('build/')) renderBuilder(r.slice(6));
  else if (r.startsWith('product/')) renderProductDetail(r.slice(8));
  else if (r.startsWith('catalog/')) renderCatalog(r.slice(8));
  else if (r === 'settings') renderSettings();
  else renderProducts('all');
}

  colorways: {
    rondel: ['clear', 'arroyo', 'cambria', 'farallon', 'melrose', 'mojave',

async function importSeedData() {
  if (!confirm(
    'Load TED\'s product line catalog?\n\n' +
    'This will populate: 26 colorways, glasses, metals, rondel types, elements, pips, finishes, ' +
    '16 patterns, and 18 mosaic product shells (with glass selections empty for you to fill in).\n\n' +
    'Existing entries are not duplicated — safe to run.'
  )) return;

  setSaveStatus('saving', 'Importing…');

  try {
    const now = new Date().toISOString();

    // find-or-create by name (case-insensitive) in a catalog
    function ensure(key, name, extra) {
      const existing = (STATE.data[key] || []).find(x =>
        (x.name || '').toLowerCase().trim() === name.toLowerCase().trim()
      );
      if (existing) {
        // Patch in fields that may be missing (e.g. category on a partial entry)
        if (extra) Object.entries(extra).forEach(([k, v]) => {
          if (existing[k] === undefined || existing[k] === '' ||
              (Array.isArray(existing[k]) && existing[k].length === 0)) {
            existing[k] = v;
          }
        });
        return existing;
      }
      const slug = key.replace('ted-build-', '');
      const item = { id: newId(slug), name, createdAt: now, ...(extra || {}) };
      STATE.data[key] = [...(STATE.data[key] || []), item];
      return item;
    }

    // Colorways
    const cwId = {};
    [...SEED.colorways.rondel, ...SEED.colorways.leadlight, ...SEED.colorways.mosaic]
      .forEach(n => { cwId[n] = ensure('ted-build-colorways', n).id; });

    // Simple name-only catalogs
    SEED.glass.forEach(n => ensure('ted-build-glass', n));
    SEED.metals.forEach(n => ensure('ted-build-metals', n));
    SEED.rondelTypes.forEach(n => ensure('ted-build-rondel-types', n));
    SEED.pips.forEach(n => ensure('ted-build-pips', n));
    SEED.finishes.forEach(n => ensure('ted-build-finishes', n));

    // Elements (with slots)
    const elId = {};
    SEED.elements.forEach(el => {
      elId[el.name] = ensure('ted-build-elements', el.name, { colorSlots: el.colorSlots }).id;
    });

    // Patterns
    const patId = {};
    SEED.rondelPatterns.forEach(p => {
      const item = ensure('ted-build-patterns', p.name, {
        category: 'leaded-rondel',
        scaleOptions: p.scaleOptions || [],
        elementTypes: [],
        colorways: SEED.colorways.rondel.map(n => cwId[n]),
      });
      patId[p.name] = item.id;
    });
    SEED.leadlightPatterns.forEach(p => {
      const item = ensure('ted-build-patterns', p.name, {
        category: 'leaded-leadlight',
        scaleOptions: [],
        elementTypes: [],
        colorways: SEED.colorways.leadlight.map(n => cwId[n]),
      });
      patId[p.name] = item.id;
    });
    SEED.mosaicPatterns.forEach(p => {
      const item = ensure('ted-build-patterns', p.name, {
        category: 'mosaic',
        scaleOptions: [],
        elementTypes: [elId.flower],
        colorways: p.colorways.map(n => cwId[n]),
      });
      patId[p.name] = item.id;
    });

    // Mosaic product shells: (pattern × each of its colorways)
    const products = [...(STATE.data['ted-build-products'] || [])];
    let createdProducts = 0;
    SEED.mosaicPatterns.forEach(p => {
      p.colorways.forEach(cwName => {
        const productName = cap(p.name) + ' · ' + cap(cwName);
        const exists = products.some(x =>
          (x.name || '').toLowerCase() === productName.toLowerCase());
        if (exists) return;
        products.push({
          id: newId('prod'),
          name: productName,
          classification: 'collection',
          medium: 'mosaic',
          patternId: patId[p.name],
          colorwayId: cwId[cwName],
          scale: '',
          backgroundGlassIds: [],
          foregroundGlassIds: [],
          interstitialGlassIds: [],
          metalId: '', rondelTypeId: '', cameId: '',
          elements: [{ elementId: elId.flower, slots: {} }],
          groutId: '', pipIds: [], finishId: '',
          notes: '',
          author: STATE.config?.author || 'Imported',
          images: [],
          createdAt: now,
          lastEditedAt: now,
        });
        createdProducts++;
      });
    });
    STATE.data['ted-build-products'] = products;

    // Save each catalog with a small spacing — works with both the new Code.gs
    // (LockService + setMulti) and any older deployment that only supports 'set'.
    const keysToSave = [
      'ted-build-colorways', 'ted-build-glass', 'ted-build-metals',
      'ted-build-rondel-types', 'ted-build-elements', 'ted-build-pips',
      'ted-build-finishes', 'ted-build-patterns', 'ted-build-products',
    ];

    STATE.saveQueue++;
    setSaveStatus('saving', 'Saving to sheet…');
    try {
      for (let i = 0; i < keysToSave.length; i++) {
        const key = keysToSave[i];
        setSaveStatus('saving', `Saving ${i + 1}/${keysToSave.length}…`);
        await postWrite({ action: 'set', key, value: JSON.stringify(STATE.data[key] || []) });
        // Give the server room between writes
        await new Promise(r => setTimeout(r, 400));
      }
    } finally {
      STATE.saveQueue--;
    }

    // Verify by re-reading from the server (no grace period applies to manual fetch)
    setSaveStatus('saving', 'Verifying…');
    await new Promise(r => setTimeout(r, 1500));
    try {
      await fetchAll();
      const patternCount = (STATE.data['ted-build-patterns'] || []).length;
      if (patternCount === 0) {
        toast(
          'Import did not persist any data. Likely cause: Code.gs was not redeployed as a new version. ' +
          'Try Settings → Test connection for details.',
          true
        );
      } else if (patternCount < 16) {
        toast(`Warning: only ${patternCount}/16 patterns saved. Some writes may have failed — try the import again.`, true);
      } else {
        toast(`Imported ${patternCount} patterns and ${createdProducts} new mosaic product shells.`);
      }
    } catch (e) {
      toast('Saved, but could not verify: ' + e.message, true);
    }

    setSaveStatus('saved');
    renderCounts();
    navigate('products/all');
  } catch (e) {
    setSaveStatus('', 'Idle');
    toast('Import failed: ' + e.message, true);
  }
}

/* ────────────────────────────────────────────────────────────────
   CONNECTION DIAGNOSTICS
   ──────────────────────────────────────────────────────────────── */

async function testConnection() {
  setSaveStatus('saving', 'Testing connection…');
  let pingResult;
  try {
    pingResult = await jsonpGet({ action: 'ping' });
    if (!pingResult || !pingResult.ok) throw new Error('Backend did not respond OK');
  } catch (e) {
    setSaveStatus('', 'Idle');
    toast('Could not reach backend: ' + e.message, true);
    return;
  }

  const version = pingResult.version || 'unknown (pre-v2)';
  const supportsMulti = pingResult.supports && pingResult.supports.includes('setMulti');

  // Round-trip write test
  const testKey = 'ted-build-_connection_test';
  const testValue = 'roundtrip-' + Date.now();
  try {
    await postWrite({ action: 'set', key: testKey, value: testValue });
    await new Promise(r => setTimeout(r, 2000));
    const read = await jsonpGet({ action: 'get', key: testKey });
    setSaveStatus('');
    if (read && read.value === testValue) {
      const versionNote = supportsMulti
        ? '✓ Backend is up to date.'
        : '⚠ Backend is the old version. Redeploy Code.gs as a New version (Deploy → Manage deployments → pencil icon → Version: New version → Deploy).';
      toast(`✓ Read/write round-trip works. Backend version: ${version}. ${versionNote}`);
    } else {
      throw new Error('Round-trip mismatch — write went out but value did not persist.');
    }
  } catch (e) {
    setSaveStatus('', 'Idle');
    toast('Round-trip test failed: ' + e.message + '. Check Apps Script Executions log.', true);
  }
}

/* ────────────────────────────────────────────────────────────────
   LOOKUPS
   ──────────────────────────────────────────────────────────────── */

function findById(key, id) {
  return (STATE.data[key] || []).find(x => x.id === id);
}
function nameOf(key, id) {
  const item = findById(key, id);
  return item ? item.name : '(missing)';
}
function imageOf(key, id) {
  const item = findById(key, id);
  return item && item.image ? item.image : '';
}

function renderCounts() {
  const products = STATE.data['ted-build-products'] || [];
  document.getElementById('count-all').textContent = products.length;
  document.getElementById('count-leaded').textContent =
    products.filter(p => p.medium === 'leaded').length;
  document.getElementById('count-mosaic').textContent =
    products.filter(p => p.medium === 'mosaic').length;
  Object.entries(CATALOGS).forEach(([slug, c]) => {
    const el = document.getElementById('count-' + slug);
    if (el) el.textContent = (STATE.data[c.key] || []).length;
  });
}

  else if (scope === 'mosaic') products = products.filter(p => p.medium === 'mosaic');

  // Apply classification & search filters
  if (STATE.filter.classification !== 'all')
    products = products.filter(p => p.classification === STATE.filter.classification);
  if (STATE.filter.search) {
    const q = STATE.filter.search.toLowerCase();
    products = products.filter(p =>
      (p.name || '').toLowerCase().includes(q) ||
      (p.notes || '').toLowerCase().includes(q)
    );
  }

  const titles = {
    all: 'All products',
    leaded: 'Leaded glass',
    mosaic: 'Mosaic',
  };

  let html = `
    <div class="page-head">
      <div>
        <div class="page-eyebrow">Browse · ${(STATE.data['ted-build-products'] || []).length} total</div>
        <div class="page-title">${titles[scope] || 'Products'}</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="navigate('build')">+ New product</button>
      </div>
    </div>

    <div class="filter-bar">
      <button class="chip ${STATE.filter.classification === 'all' ? 'active' : ''}"
              onclick="setFilter('classification', 'all')">All</button>
      <button class="chip ${STATE.filter.classification === 'collection' ? 'active' : ''}"
              onclick="setFilter('classification', 'collection')">Collection</button>
      <button class="chip ${STATE.filter.classification === 'bespoke' ? 'active' : ''}"
              onclick="setFilter('classification', 'bespoke')">Bespoke</button>
      <input class="search" placeholder="Search by name or notes…"
             value="${escapeAttr(STATE.filter.search)}"
             oninput="setFilter('search', this.value)" style="margin-left: auto;" />
    </div>
  `;

  if (products.length === 0) {
    html += `
      <div class="empty-state">
        <h3>No products here yet</h3>
        <p>Start by building one — and make sure your catalogs are populated first.</p>
      </div>`;
  } else {
    html += '<div class="grid">';
    for (const p of products) {
      const img = p.images && p.images[0] ? p.images[0] : '';
      const tag = p.medium === 'leaded' ? 'Leaded' : 'Mosaic';
      const tagClass = p.medium === 'leaded' ? 'leaded' : 'mosaic';
      const subtitle = buildProductSubtitle(p);
      html += `
        <div class="card" onclick="navigate('product/${p.id}')">
          <div class="card-image ${img ? '' : 'empty'}"
               ${img ? `style="background-image: url('${escapeAttr(img)}')"` : ''}>
            ${img ? '' : 'No image'}
            <span class="card-tag ${tagClass}">${tag}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(p.name || 'Untitled')}</div>
            <div class="card-meta">${escapeHtml(subtitle)}</div>
          </div>
        </div>`;
    }
    html += '</div>';
  }

  main.innerHTML = html;
}

function buildProductSubtitle(p) {
  const bits = [];
  if (p.classification) bits.push(p.classification);
  if (p.patternId) bits.push(nameOf('ted-build-patterns', p.patternId));
  if (p.colorwayId) bits.push(nameOf('ted-build-colorways', p.colorwayId));
  return bits.join(' · ');
}

function setFilter(field, value) {
  STATE.filter[field] = value;
  rerenderRoute();
}

/* ────────────────────────────────────────────────────────────────
   RENDER: PRODUCT DETAIL
   ──────────────────────────────────────────────────────────────── */

function renderProductDetail(id) {
  const main = document.getElementById('main');
  const p = findById('ted-build-products', id);
  if (!p) {
    main.innerHTML = `<div class="empty-state"><h3>Product not found</h3>
      <p><button class="btn" onclick="navigate('products/all')">← Back to products</button></p></div>`;
    return;
  }

  const pattern = findById('ted-build-patterns', p.patternId);
  const colorway = findById('ted-build-colorways', p.colorwayId);
  const isLeaded = p.medium === 'leaded';

  let specHtml = '';

  specHtml += specRow('Classification', cap(p.classification || ''));
  specHtml += specRow('Pattern', pattern ? pattern.name : '—');
  if (pattern) specHtml += specRow('Pattern category', formatCategory(pattern.category));
  if (colorway) specHtml += specRow('Colorway', colorway.name);
  if (p.scale) specHtml += specRow('Scale', p.scale);

  // Glass references (multi)
  if (p.backgroundGlassIds && p.backgroundGlassIds.length)
    specHtml += specRow('Background glass', renderRefChips('ted-build-glass', p.backgroundGlassIds));
  if (p.foregroundGlassIds && p.foregroundGlassIds.length)
    specHtml += specRow('Foreground glass', renderRefChips('ted-build-glass', p.foregroundGlassIds));

  // Leaded-specific
  if (isLeaded) {
    if (p.metalId) specHtml += specRow('Metal finish', renderRefChip('ted-build-metals', p.metalId));
    if (p.interstitialGlassIds && p.interstitialGlassIds.length)
      specHtml += specRow('Interstitial glass', renderRefChips('ted-build-glass', p.interstitialGlassIds));
    if (p.rondelTypeId) specHtml += specRow('Rondel type', renderRefChip('ted-build-rondel-types', p.rondelTypeId));
    if (p.cameId) specHtml += specRow('Came profile', renderRefChip('ted-build-came', p.cameId));
  }

  // Mosaic-specific
  if (!isLeaded) {
    if (p.elements && p.elements.length) {
      const elementBlocks = p.elements.map(el => {
        const elDef = findById('ted-build-elements', el.elementId);
        const elName = elDef ? elDef.name : 'Element';
        const slotRows = Object.entries(el.slots || {}).map(([slot, glassId]) =>
          `<div class="slot-row"><div class="slot-name">${escapeHtml(slot)}</div>
           <div>${renderRefChip('ted-build-glass', glassId) || '—'}</div></div>`
        ).join('');
        return `<div class="element-block">
          <div class="element-name">${escapeHtml(elName)}</div>
          ${slotRows}
        </div>`;
      }).join('');
      specHtml += specRow('Elements', elementBlocks);
    }
    if (p.groutId) specHtml += specRow('Grout', renderRefChip('ted-build-grout', p.groutId));
    if (p.pipIds && p.pipIds.length) specHtml += specRow('Pips', renderRefChips('ted-build-pips', p.pipIds));
    if (p.finishId) specHtml += specRow('Finish', renderRefChip('ted-build-finishes', p.finishId));
  }

  if (p.notes) specHtml += specRow('Notes', `<div style="white-space: pre-wrap;">${escapeHtml(p.notes)}</div>`);

  // Metadata
  const meta = [];
  if (p.author) meta.push(`Created by ${escapeHtml(p.author)}`);
  if (p.createdAt) meta.push(formatDate(p.createdAt));
  if (p.lastEditedBy && p.lastEditedBy !== p.author)
    meta.push(`Last edited by ${escapeHtml(p.lastEditedBy)} ${formatDate(p.lastEditedAt)}`);

  const galleryHtml = (p.images && p.images.length)
    ? `<div class="detail-gallery">${p.images.map(u =>
        `<img src="${escapeAttr(u)}" alt="">`).join('')}</div>`
    : '';

  main.innerHTML = `
    <div class="page-head">
      <div>
        <button class="btn btn-ghost btn-sm" onclick="navigate('products/${p.medium === 'leaded' ? 'leaded' : 'mosaic'}')">← Back</button>
      </div>
      <div class="page-actions">
        <button class="btn" onclick="window.print()">Print / PDF</button>
        <button class="btn" onclick="navigate('build/${p.id}')">Edit</button>
        <button class="btn btn-danger" onclick="confirmDeleteProduct('${p.id}')">Delete</button>
      </div>
    </div>

    <div class="detail">
      <div class="detail-head">
        <div>
          <div class="detail-eyebrow">${isLeaded ? 'Leaded glass' : 'Mosaic'} · ${cap(p.classification || '')}</div>
          <div class="detail-title">${escapeHtml(p.name || 'Untitled')}</div>
        </div>
      </div>

      ${galleryHtml}

      <div class="spec-grid">
        ${specHtml}
      </div>

      ${meta.length ? `<div class="card-meta" style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--line-soft);">${meta.join(' · ')}</div>` : ''}
    </div>
  `;
}

function specRow(label, value) {
  return `<div class="spec-label">${escapeHtml(label)}</div><div class="spec-value">${value}</div>`;
}
function renderRefChip(key, id) {
  if (!id) return '';
  const item = findById(key, id);
  if (!item) return `<span class="ref-chip">(missing)</span>`;
  const imgUrl = (item.images && item.images[0]) || item.image || '';
  const img = imgUrl ? `<span class="ref-chip-thumb" style="background-image: url('${escapeAttr(imgUrl)}')"></span>` : '';
  return `<span class="ref-chip">${img}${escapeHtml(item.name)}</span>`;
}
function renderRefChips(key, ids) {
  if (!ids || !ids.length) return '—';
  return `<div class="ref-chips">${ids.map(id => renderRefChip(key, id)).join('')}</div>`;
}

async function confirmDeleteProduct(id) {
  const p = findById('ted-build-products', id);
  if (!p) return;
  if (!confirm(`Delete "${p.name}"? This cannot be undone.`)) return;
  const next = (STATE.data['ted-build-products'] || []).filter(x => x.id !== id);
  await saveKey('ted-build-products', next);
  toast('Product deleted');
  navigate('products/all');
}

/* ────────────────────────────────────────────────────────────────
   RENDER: PRODUCT BUILDER
   Type-aware form. Picking a pattern drives the rest of the form.
   ──────────────────────────────────────────────────────────────── */

let BUILDER_DRAFT = null;

function renderBuilder(editId) {
  const main = document.getElementById('main');
  // Initialize draft
  if (editId) {
    const existing = findById('ted-build-products', editId);
    BUILDER_DRAFT = existing ? JSON.parse(JSON.stringify(existing)) : newDraft();
    // Backward-compat: derive 'type' for leaded products that don't have it yet
    if (BUILDER_DRAFT.medium === 'leaded' && !BUILDER_DRAFT.type && BUILDER_DRAFT.patternId) {
      const pat = findById('ted-build-patterns', BUILDER_DRAFT.patternId);
      if (pat) {
        BUILDER_DRAFT.type = pat.category === 'leaded-rondel' ? 'rondel'
                          : pat.category === 'leaded-leadlight' ? 'leadlight' : '';
      }
    }
  } else if (!BUILDER_DRAFT || BUILDER_DRAFT.id) {
    BUILDER_DRAFT = newDraft();
  }

  const d = BUILDER_DRAFT;
  const patterns = STATE.data['ted-build-patterns'] || [];

  // Filter pattern dropdown by current Medium + Type
  let availablePatterns = [];
  if (d.medium === 'mosaic') {
    availablePatterns = patterns.filter(p => p.category === 'mosaic');
  } else if (d.medium === 'leaded' && d.type === 'rondel') {
    availablePatterns = patterns.filter(p => p.category === 'leaded-rondel');
  } else if (d.medium === 'leaded' && d.type === 'leadlight') {
    availablePatterns = patterns.filter(p => p.category === 'leaded-leadlight');
  }

  const isNewPattern = d.patternId === '__new__';
  const pattern = (d.patternId && !isNewPattern) ? findById('ted-build-patterns', d.patternId) : null;
  const patternReady = pattern || (isNewPattern && (d.newPatternName || '').trim());
  const hierarchyReady = d.medium === 'mosaic' || (d.medium === 'leaded' && d.type);

  let html = `
    <div class="page-head">
      <div>
        <div class="page-eyebrow">${editId ? 'Edit' : 'Build'} product</div>
        <div class="page-title">${editId ? escapeHtml(d.name || 'Untitled') : 'New product'}</div>
      </div>
      <div class="page-actions">
        <button class="btn" onclick="cancelBuilder()">Cancel</button>
        <button class="btn btn-primary" onclick="saveBuilder()">${editId ? 'Save changes' : 'Save product'}</button>
      </div>
    </div>
    <div class="form-container">

      <div class="form-section">
        <div class="form-section-title">Identity</div>

        <div class="form-row">
          <div class="form-label">Name <span class="req">*</span></div>
          <div>
            <input class="form-input" value="${escapeAttr(d.name || '')}"
                   oninput="BUILDER_DRAFT.name = this.value">
            <div class="form-hint">A descriptive name. E.g. "Bloom · Surf · American Seedy" or "Smith residence custom".</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-label">Medium <span class="req">*</span></div>
          <div class="checkbox-group">
            <button class="check-pill ${d.medium === 'mosaic' ? 'checked' : ''}"
                    onclick="setMedium('mosaic')">Mosaic</button>
            <button class="check-pill ${d.medium === 'leaded' ? 'checked' : ''}"
                    onclick="setMedium('leaded')">Leaded glass</button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-label">Classification <span class="req">*</span></div>
          <div class="checkbox-group">
            ${['collection', 'bespoke'].map(c => `
              <button class="check-pill ${d.classification === c ? 'checked' : ''}"
                      onclick="setDraft('classification', '${c}')">${cap(c)}</button>
            `).join('')}
          </div>
        </div>

        ${d.medium === 'leaded' ? `
        <div class="form-row">
          <div class="form-label">Type <span class="req">*</span></div>
          <div class="checkbox-group">
            <button class="check-pill ${d.type === 'rondel' ? 'checked' : ''}"
                    onclick="setType('rondel')">Rondel</button>
            <button class="check-pill ${d.type === 'leadlight' ? 'checked' : ''}"
                    onclick="setType('leadlight')">Leadlight</button>
          </div>
        </div>` : ''}
      </div>

      ${hierarchyReady ? `
      <div class="form-section">
        <div class="form-section-title">Pattern</div>

        <div class="form-row">
          <div class="form-label">Pattern <span class="req">*</span></div>
          <div>
            <select class="form-select" onchange="setPattern(this.value)">
              <option value="">— Select a pattern —</option>
              ${availablePatterns.map(p =>
                `<option value="${p.id}" ${p.id === d.patternId ? 'selected' : ''}>${escapeHtml(p.name)}</option>`
              ).join('')}
              <option value="__new__" ${isNewPattern ? 'selected' : ''}>+ Create new pattern…</option>
            </select>
            <div class="form-hint">Patterns are managed under <a href="#" onclick="navigate('catalog/patterns'); return false;">Catalogs → Patterns</a>.</div>
          </div>
        </div>

        ${isNewPattern ? `
        <div class="form-row">
          <div class="form-label">New pattern name <span class="req">*</span></div>
          <div>
            <input class="form-input" value="${escapeAttr(d.newPatternName || '')}"
                   oninput="BUILDER_DRAFT.newPatternName = this.value">
            <div class="form-hint">Will be added to your ${escapeHtml(categoryLabel(d.medium, d.type))} patterns catalog when you save.</div>
          </div>
        </div>` : ''}

        ${pattern && pattern.scaleOptions && pattern.scaleOptions.length ? `
        <div class="form-row">
          <div class="form-label">Scale</div>
          <div class="checkbox-group">
            ${pattern.scaleOptions.map(s => `
              <button class="check-pill ${d.scale === s ? 'checked' : ''}"
                      onclick="setDraft('scale', '${escapeAttr(s)}')">${escapeHtml(s)}</button>
            `).join('')}
          </div>
        </div>` : ''}
      </div>` : ''}

      ${patternReady ? renderBuildSection(d, pattern) : ''}

      ${hierarchyReady ? `
      <div class="form-section">
        <div class="form-section-title">Images & notes</div>

        <div class="form-row">
          <div class="form-label">Images</div>
          <div>
            ${renderImagePicker('builder-product', d.images || [], 'updateBuilderImages')}
          </div>
        </div>

        <div class="form-row">
          <div class="form-label">Notes</div>
          <div>
            <textarea class="form-textarea"
                      oninput="BUILDER_DRAFT.notes = this.value">${escapeHtml(d.notes || '')}</textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-label">Author / editor</div>
          <div>
            <input class="form-input" placeholder="Your name" value="${escapeAttr(d.author || STATE.config?.author || '')}"
                   oninput="BUILDER_DRAFT.author = this.value">
          </div>
        </div>
      </div>` : ''}

    </div>
  `;
  main.innerHTML = html;
}

function renderBuildSection(d, pattern) {
  if (d.medium === 'leaded' && d.type === 'rondel') return renderRondelBuild(d, pattern);
  if (d.medium === 'leaded' && d.type === 'leadlight') return renderLeadlightBuild(d, pattern);
  if (d.medium === 'mosaic') return renderMosaicBuild(d, pattern);
  return '';
}

function renderRondelBuild(d, pattern) {
  return `
    <div class="form-section">
      <div class="form-section-title">Rondel build</div>

      <div class="form-row">
        <div class="form-label">Array (colorway)</div>
        <div>${renderColorwaySelect(d, pattern)}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Metal finish</div>
        <div>${renderSingleRef('ted-build-metals', d.metalId, 'metalId')}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Interstitial glass</div>
        <div>${renderMultiRef('ted-build-glass', d.interstitialGlassIds, 'updateRefList', 'interstitialGlassIds')}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Rondel type</div>
        <div>${renderSingleRef('ted-build-rondel-types', d.rondelTypeId, 'rondelTypeId')}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Came profile</div>
        <div>${renderSingleRef('ted-build-came', d.cameId, 'cameId')}</div>
      </div>
    </div>
  `;
}

function renderLeadlightBuild(d, pattern) {
  return `
    <div class="form-section">
      <div class="form-section-title">Leadlight build</div>

      <div class="form-row">
        <div class="form-label">Array (colorway)</div>
        <div>${renderColorwaySelect(d, pattern)}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Background glass</div>
        <div>${renderMultiRef('ted-build-glass', d.backgroundGlassIds, 'updateRefList', 'backgroundGlassIds')}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Came profile</div>
        <div>${renderSingleRef('ted-build-came', d.cameId, 'cameId')}</div>
      </div>
    </div>
  `;
}

function renderMosaicBuild(d, pattern) {
  const elementsCatalog = STATE.data['ted-build-elements'] || [];

  const elementBlocks = (d.elements || []).map((elRow, idx) => {
    const elDef = findById('ted-build-elements', elRow.elementId);
    if (!elDef) {
      return `<div class="element-block">
        <div class="element-head">
          <div class="element-name">(missing element)</div>
          <button class="btn btn-sm btn-danger" onclick="removeElement(${idx})">Remove</button>
        </div>
      </div>`;
    }
    const slotRows = (elDef.colorSlots || []).map(slot => `
      <div class="slot-row">
        <div class="slot-name">${escapeHtml(slot)}</div>
        <div>${renderSingleRef('ted-build-glass', (elRow.slots || {})[slot] || '', null,
          `setElementSlot(${idx}, '${escapeAttr(slot)}', this.value)`)}</div>
      </div>
    `).join('');
    return `
      <div class="element-block">
        <div class="element-head">
          <div class="element-name">${escapeHtml(elDef.name)}</div>
          <button class="btn btn-sm btn-ghost" onclick="removeElement(${idx})">Remove</button>
        </div>
        ${slotRows}
      </div>
    `;
  }).join('');

  // Available elements to add — exclude ones already in the draft to reduce duplicates
  const usedElementIds = new Set((d.elements || []).map(e => e.elementId));
  const availableElements = elementsCatalog.filter(e => !usedElementIds.has(e.id));

  return `
    <div class="form-section">
      <div class="form-section-title">Mosaic build</div>

      <div class="form-row">
        <div class="form-label">Colorway</div>
        <div>${renderColorwaySelect(d, pattern)}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Elements & color slots</div>
        <div>
          ${elementBlocks || '<div class="form-hint" style="margin-bottom: 8px;">No elements yet. Add one below to define color slots.</div>'}
          ${availableElements.length ? `
          <select class="form-select" onchange="if(this.value){addElement(this.value); this.value='';}" style="margin-top: 8px;">
            <option value="">+ Add element…</option>
            ${availableElements.map(el => `<option value="${el.id}">${escapeHtml(el.name)}</option>`).join('')}
          </select>` : ''}
        </div>
      </div>

      <div class="form-row">
        <div class="form-label">Grout</div>
        <div>${renderSingleRef('ted-build-grout', d.groutId, 'groutId')}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Pips</div>
        <div>${renderMultiRef('ted-build-pips', d.pipIds, 'updateRefList', 'pipIds')}</div>
      </div>

      <div class="form-row">
        <div class="form-label">Finish</div>
        <div>${renderSingleRef('ted-build-finishes', d.finishId, 'finishId')}</div>
      </div>
    </div>
  `;
}

function renderColorwaySelect(d, pattern) {
  const all = STATE.data['ted-build-colorways'] || [];
  // If existing pattern restricts colorways, filter; otherwise show all.
  let options = all;
  if (pattern && pattern.colorways && pattern.colorways.length) {
    options = all.filter(c => pattern.colorways.includes(c.id));
  }
  return `
    <select class="form-select" onchange="setDraft('colorwayId', this.value)">
      <option value="">— Optional —</option>
      ${options.map(c => `<option value="${c.id}" ${d.colorwayId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}
    </select>
  `;
}

function newDraft() {
  return {
    id: null,
    name: '',
    classification: 'collection',
    medium: '',
    type: '',
    patternId: '',
    newPatternName: '',
    scale: '',
    colorwayId: '',
    backgroundGlassIds: [],
    foregroundGlassIds: [],
    interstitialGlassIds: [],
    metalId: '',
    rondelTypeId: '',
    cameId: '',
    elements: [],
    groutId: '',
    pipIds: [],
    finishId: '',
    notes: '',
    author: STATE.config?.author || '',
    images: [],
  };
}

function categoryLabel(medium, type) {
  if (medium === 'mosaic') return 'mosaic';
  if (medium === 'leaded' && type === 'rondel') return 'leaded glass · rondel';
  if (medium === 'leaded' && type === 'leadlight') return 'leaded glass · leadlight';
  return '';
}

function setMedium(m) {
  BUILDER_DRAFT.medium = m;
  if (m !== 'leaded') BUILDER_DRAFT.type = '';
  // Clear pattern and downstream when medium changes
  BUILDER_DRAFT.patternId = '';
  BUILDER_DRAFT.newPatternName = '';
  BUILDER_DRAFT.scale = '';
  BUILDER_DRAFT.colorwayId = '';
  BUILDER_DRAFT.elements = [];
  // Clear medium-incompatible fields
  if (m === 'mosaic') {
    BUILDER_DRAFT.metalId = '';
    BUILDER_DRAFT.interstitialGlassIds = [];
    BUILDER_DRAFT.rondelTypeId = '';
    BUILDER_DRAFT.backgroundGlassIds = [];
    BUILDER_DRAFT.foregroundGlassIds = [];
  } else {
    BUILDER_DRAFT.groutId = '';
    BUILDER_DRAFT.pipIds = [];
    BUILDER_DRAFT.finishId = '';
  }
  rerenderRoute();
}

function setType(t) {
  BUILDER_DRAFT.type = t;
  // Clear pattern when type changes
  BUILDER_DRAFT.patternId = '';
  BUILDER_DRAFT.newPatternName = '';
  BUILDER_DRAFT.scale = '';
  BUILDER_DRAFT.colorwayId = '';
  // Clear type-incompatible fields
  if (t === 'rondel') {
    BUILDER_DRAFT.backgroundGlassIds = [];
  } else if (t === 'leadlight') {
    BUILDER_DRAFT.interstitialGlassIds = [];
    BUILDER_DRAFT.rondelTypeId = '';
  }
  rerenderRoute();
}

function setPattern(patternId) {
  BUILDER_DRAFT.patternId = patternId;
  BUILDER_DRAFT.scale = '';
  BUILDER_DRAFT.colorwayId = '';

  if (patternId === '__new__') {
    // For a new pattern, start with no pre-filled elements
    BUILDER_DRAFT.elements = [];
  } else if (patternId) {
    const p = findById('ted-build-patterns', patternId);
    if (p && BUILDER_DRAFT.medium === 'mosaic' && p.elementTypes && p.elementTypes.length) {
      BUILDER_DRAFT.elements = p.elementTypes.map(elementId => ({
        elementId,
        slots: {},
      }));
    } else {

async function saveBuilder() {
  const d = BUILDER_DRAFT;
  if (!d.name || !d.name.trim()) { toast('Name is required', true); return; }
  if (!d.medium) { toast('Medium is required', true); return; }
  if (!d.classification) { toast('Classification is required', true); return; }
  if (d.medium === 'leaded' && !d.type) { toast('Type (Rondel or Leadlight) is required', true); return; }
  if (!d.patternId) { toast('Pattern is required', true); return; }
  if (d.patternId === '__new__' && !(d.newPatternName || '').trim()) {
    toast('New pattern name is required', true); return;
  }

  // If creating a new pattern, save it first and link the product to its id
  if (d.patternId === '__new__') {
    const category = d.medium === 'mosaic' ? 'mosaic'
                   : d.type === 'rondel' ? 'leaded-rondel' : 'leaded-leadlight';
    const newName = d.newPatternName.trim();

    // Avoid duplicates if a pattern by that name+category already exists
    const existingPatterns = STATE.data['ted-build-patterns'] || [];
    const dup = existingPatterns.find(p =>
      (p.name || '').toLowerCase().trim() === newName.toLowerCase() &&
      p.category === category);

    let patternId;
    if (dup) {
      patternId = dup.id;
    } else {
      const newPattern = {
        id: newId('patterns'),
        name: newName,
        category,
        scaleOptions: [],
        elementTypes: (d.elements || []).map(e => e.elementId).filter(Boolean),
        colorways: d.colorwayId ? [d.colorwayId] : [],
        images: [],
        notes: '',
        createdAt: new Date().toISOString(),
      };
      await saveKey('ted-build-patterns', [...existingPatterns, newPattern]);
      patternId = newPattern.id;
    }
    d.patternId = patternId;
    delete d.newPatternName;
  }

  const now = new Date().toISOString();
  if (!d.id) {
    d.id = newId('prod');
    d.createdAt = now;
  }
  d.lastEditedAt = now;
  if (d.author) d.lastEditedBy = d.author;

  // Save config author preference
  if (d.author && STATE.config) {
    STATE.config.author = d.author;
    saveConfig(STATE.config);
  }

  const existing = STATE.data['ted-build-products'] || [];
  const idx = existing.findIndex(x => x.id === d.id);
  let next;
  if (idx >= 0) { next = [...existing]; next[idx] = d; }
  else next = [d, ...existing];

  await saveKey('ted-build-products', next);
  toast(idx >= 0 ? 'Product saved' : 'Product created');
  BUILDER_DRAFT = null;
  navigate('product/' + d.id);
}

let CATALOG_DRAFT = null;

function renderCatalog(slug) {
  const main = document.getElementById('main');
  const cat = CATALOGS[slug];
  if (!cat) { main.innerHTML = `<div class="empty-state">Unknown catalog</div>`; return; }

  const items = STATE.data[cat.key] || [];

  let html = `
    <div class="page-head">
      <div>
        <div class="page-eyebrow">Catalog · ${items.length} entries</div>
        <div class="page-title">${cat.label}</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="openCatalogForm('${slug}', null)">+ New ${cat.singular}</button>
      </div>
    </div>
  `;

  if (CATALOG_DRAFT && CATALOG_DRAFT._slug === slug) {
    html += renderCatalogForm(cat, slug);
  }

  if (items.length === 0 && !CATALOG_DRAFT) {
    html += `
      <div class="empty-state">
        <h3>No ${cat.label.toLowerCase()} yet</h3>
        <p>Add your first ${cat.singular} to start building products.</p>
      </div>`;
  } else if (items.length > 0) {
    html += '<div class="grid">';
    for (const it of items) {
      const img = (it.images && it.images[0]) || it.image || '';
      const subtitle = buildCatalogSubtitle(slug, it);
      html += `
        <div class="card" onclick="openCatalogForm('${slug}', '${it.id}')">
          <div class="card-image ${img ? '' : 'empty'}"
               ${img ? `style="background-image: url('${escapeAttr(img)}')"` : ''}>
            ${img ? '' : 'No image'}
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(it.name || 'Unnamed')}</div>
            ${subtitle ? `<div class="card-meta">${escapeHtml(subtitle)}</div>` : ''}
          </div>
        </div>`;
    }
    html += '</div>';
  }

  main.innerHTML = html;
}

function buildCatalogSubtitle(slug, item) {
  if (slug === 'glass') {
    const bits = [];
    if (item.code) bits.push(item.code);
    if (item.supplier) bits.push(item.supplier);
    return bits.join(' · ');
  }
  if (slug === 'patterns') return formatCategory(item.category || '');
  if (slug === 'elements') return (item.colorSlots || []).join(' · ');
  if (slug === 'came' && item.profile) return item.profile;
  if (slug === 'grout' && item.colorCode) return item.colorCode;
  return '';
}

function renderCatalogForm(cat, slug) {
  const d = CATALOG_DRAFT;
  const isEdit = !!d.id;
  let html = `
    <div class="form-container" style="margin-top: -10px;">
      <div class="form-section-title">${isEdit ? 'Edit' : 'New'} ${cat.singular}</div>
  `;

  for (const f of cat.fields) {
    let inputHtml = '';
    const val = d[f.name];
    if (f.type === 'text') {
      inputHtml = `<input class="form-input" value="${escapeAttr(val || '')}"
                      oninput="CATALOG_DRAFT.${f.name} = this.value">`;
    } else if (f.type === 'textarea') {
      inputHtml = `<textarea class="form-textarea"
                      oninput="CATALOG_DRAFT.${f.name} = this.value">${escapeHtml(val || '')}</textarea>`;
    } else if (f.type === 'select') {
      inputHtml = `<select class="form-select" onchange="CATALOG_DRAFT.${f.name} = this.value">
        <option value="">—</option>
        ${f.options.map(o => {
          const label = f.optionLabels?.[o] || o;
          return `<option value="${o}" ${val === o ? 'selected' : ''}>${escapeHtml(label)}</option>`;
        }).join('')}
      </select>`;
    } else if (f.type === 'text-list') {
      const txt = Array.isArray(val) ? val.join(', ') : '';
      inputHtml = `<input class="form-input" value="${escapeAttr(txt)}"
                      oninput="CATALOG_DRAFT.${f.name} = this.value.split(',').map(s => s.trim()).filter(Boolean)">`;
    } else if (f.type === 'multi-ref') {

    html += `
      <div class="form-row">
        <div class="form-label">${escapeHtml(f.label)}${f.required ? ' <span class="req">*</span>' : ''}</div>

          ${inputHtml}

    html += `
      <div class="form-row">
        <div class="form-label">Images</div>

          ${renderImagePicker('catalog-' + slug, images, 'updateCatalogImage')}

async function saveCatalogItem(slug) {
  const cat = CATALOGS[slug];
  const d = CATALOG_DRAFT;
  for (const f of cat.fields) {
    if (f.required) {
      const v = d[f.name];
      const empty = (Array.isArray(v) && v.length === 0) || (!Array.isArray(v) && !String(v || '').trim());
      if (empty) { toast(`${f.label} is required`, true); return; }
    }
  }
  const now = new Date().toISOString();
  const isEdit = !!d.id;
  if (!d.id) { d.id = newId(slug); d.createdAt = now; }
  delete d._slug;

  const existing = STATE.data[cat.key] || [];
  const idx = existing.findIndex(x => x.id === d.id);
  let next;
  if (idx >= 0) { next = [...existing]; next[idx] = d; }
  else next = [...existing, d];

  await saveKey(cat.key, next);
  toast(isEdit ? `${cap(cat.singular)} updated` : `${cap(cat.singular)} added`);
  CATALOG_DRAFT = null;
  rerenderRoute();
}

/**
 * Find every product and pattern that references a given catalog item.
 * Returns { products: [...], patterns: [...] }.
 */
function findReferences(catalogKey, itemId) {
  const products = STATE.data['ted-build-products'] || [];
  const patterns = STATE.data['ted-build-patterns'] || [];
  const refs = { products: [], patterns: [] };

  for (const p of products) {
    let hit = false;
    if (catalogKey === 'ted-build-patterns' && p.patternId === itemId) hit = true;
    else if (catalogKey === 'ted-build-colorways' && p.colorwayId === itemId) hit = true;
    else if (catalogKey === 'ted-build-metals' && p.metalId === itemId) hit = true;
    else if (catalogKey === 'ted-build-rondel-types' && p.rondelTypeId === itemId) hit = true;
    else if (catalogKey === 'ted-build-came' && p.cameId === itemId) hit = true;
    else if (catalogKey === 'ted-build-grout' && p.groutId === itemId) hit = true;
    else if (catalogKey === 'ted-build-finishes' && p.finishId === itemId) hit = true;
    else if (catalogKey === 'ted-build-pips' && (p.pipIds || []).includes(itemId)) hit = true;
    else if (catalogKey === 'ted-build-glass') {
      if ((p.backgroundGlassIds || []).includes(itemId)) hit = true;
      else if ((p.foregroundGlassIds || []).includes(itemId)) hit = true;
      else if ((p.interstitialGlassIds || []).includes(itemId)) hit = true;
      else if ((p.elements || []).some(e => Object.values(e.slots || {}).includes(itemId))) hit = true;
    }
    else if (catalogKey === 'ted-build-elements') {
      if ((p.elements || []).some(e => e.elementId === itemId)) hit = true;
    }
    if (hit) refs.products.push(p);
  }

  for (const pat of patterns) {
    if (catalogKey === 'ted-build-colorways' && (pat.colorways || []).includes(itemId)) {
      refs.patterns.push(pat);
    } else if (catalogKey === 'ted-build-elements' && (pat.elementTypes || []).includes(itemId)) {
      refs.patterns.push(pat);
    }
  }

  return refs;
}

async function deleteCatalogItem(slug, id) {
  const cat = CATALOGS[slug];
  const it = findById(cat.key, id);
  if (!it) return;

  const refs = findReferences(cat.key, id);
  const productCount = refs.products.length;
  const patternCount = refs.patterns.length;

  // Case 1: nothing references this — simple confirm
  if (productCount === 0 && patternCount === 0) {
    if (!confirm(`Delete "${it.name}"? This cannot be undone.`)) return;
    const next = (STATE.data[cat.key] || []).filter(x => x.id !== id);
    await saveKey(cat.key, next);
    toast('Deleted');
    CATALOG_DRAFT = null;
    rerenderRoute();
    return;
  }

  // Case 2: deleting a pattern with products — offer cascade delete
  if (slug === 'patterns' && productCount > 0) {
    const msg =
      `"${it.name}" is used by ${productCount} product${productCount === 1 ? '' : 's'}.\n\n` +
      `Click OK to delete the pattern AND remove all ${productCount} product${productCount === 1 ? '' : 's'} that use it.\n\n` +
      `Click Cancel to keep everything.`;
    if (!confirm(msg)) return;

    // Cascade: remove the products first, then the pattern
    const remainingProducts = (STATE.data['ted-build-products'] || []).filter(p => p.patternId !== id);
    await saveKey('ted-build-products', remainingProducts);
    const next = (STATE.data[cat.key] || []).filter(x => x.id !== id);
    await saveKey(cat.key, next);
    toast(`Deleted pattern and ${productCount} product${productCount === 1 ? '' : 's'}`);
    CATALOG_DRAFT = null;
    rerenderRoute();
    return;
  }

  // Case 3: anything else referenced by something — warn but allow
  const parts = [];
  if (productCount) parts.push(`${productCount} product${productCount === 1 ? '' : 's'}`);
  if (patternCount) parts.push(`${patternCount} pattern${patternCount === 1 ? '' : 's'}`);
  const msg =
    `"${it.name}" is referenced by ${parts.join(' and ')}.\n\n` +
    `Deleting it will leave those references broken (they'll show as "(missing)").\n\n` +
    `Delete anyway?`;
  if (!confirm(msg)) return;

  const next = (STATE.data[cat.key] || []).filter(x => x.id !== id);
  await saveKey(cat.key, next);
  toast('Deleted (some references are now broken)');
  CATALOG_DRAFT = null;
  rerenderRoute();
}

function renderImagePicker(scopeId, urls, onChangeFn) {
  const items = urls.map((u, idx) => `
    <div class="image-thumb" style="background-image: url('${escapeAttr(u)}')">
      ${idx === 0
        ? `<span class="primary-badge">Primary</span>`
        : `<button class="set-primary" title="Make primary" onclick="makePrimary('${scopeId}', ${idx}, '${onChangeFn}')">★</button>`
      }
      <button class="remove" title="Remove" onclick="removeImage('${scopeId}', ${idx}, '${onChangeFn}')">×</button>
    </div>
  `).join('');
  return `
    <div class="image-picker" id="img-picker-${scopeId}">
      ${items}
      <label class="image-upload">
        <input type="file" accept="image/*" multiple onchange="handleImageUpload(event, '${scopeId}', '${onChangeFn}')">
        <div style="font-size: 18px; line-height: 1;">+</div>
        <div>Add</div>
      </label>
    </div>
  `;
}

function makePrimary(scopeId, idx, onChangeFn) {
  const current = getPickerUrls(scopeId);
  if (idx <= 0 || idx >= current.length) return;
  const next = [current[idx], ...current.filter((_, i) => i !== idx)];
  window[onChangeFn](next);
}

function getPickerUrls(scopeId) {
  if (scopeId === 'builder-product') return BUILDER_DRAFT?.images || [];
  if (scopeId.startsWith('catalog-')) {
    if (!CATALOG_DRAFT) return [];
    return CATALOG_DRAFT.images || (CATALOG_DRAFT.image ? [CATALOG_DRAFT.image] : []);
  }
  return [];
}

async function handleImageUpload(ev, scopeId, onChangeFn) {
  const files = Array.from(ev.target.files || []);
  if (!files.length) return;
  const label = ev.target.closest('.image-upload');
  if (label) label.classList.add('uploading');
  setSaveStatus('saving', 'Uploading…');
  try {
    const current = getPickerUrls(scopeId);
    const newUrls = [];
    for (const file of files) {
      const url = await uploadImage(file);
      newUrls.push(url);
    }
    const next = [...current, ...newUrls];
    window[onChangeFn](next);
    toast('Image uploaded');
  } catch (err) {
    toast('Upload failed: ' + err.message, true);
  } finally {
    setSaveStatus('saved');
    ev.target.value = '';
  }
}

function removeImage(scopeId, idx, onChangeFn) {
  const current = getPickerUrls(scopeId);
  const next = current.filter((_, i) => i !== idx);
  window[onChangeFn](next);
}

/* ────────────────────────────────────────────────────────────────
   FIRST-RUN SETUP
   ──────────────────────────────────────────────────────────────── */

function showSetup() {
  document.getElementById('app').style.display = 'none';
  const back = document.createElement('div');
  back.className = 'modal-back';
  back.id = 'setup-modal';
  back.innerHTML = `
    <div class="modal">
      <h2>Welcome to The Build Book</h2>
      <div class="modal-sub">A studio-internal catalog of every Theodore Ellison product and the ingredients that go into it. To get started, connect this app to your Google Sheet and Drive folder.</div>

      <div class="form-row">
        <div class="form-label">Apps Script /exec URL</div>
        <input class="form-input" id="setup-exec" placeholder="https://script.google.com/macros/s/…/exec">
      </div>

      <div class="form-row" style="margin-top: 14px;">
        <div class="form-label">Drive folder ID</div>
        <input class="form-input" id="setup-folder" placeholder="The ID from the folder URL">
      </div>

      <div class="form-row" style="margin-top: 14px;">
        <div class="form-label">Your name (for authorship)</div>
        <input class="form-input" id="setup-author" placeholder="Optional">
      </div>

      <div class="modal-actions">
        <button class="btn btn-primary" onclick="completeSetup()">Connect</button>
      </div>
    </div>
  `;
  document.body.appendChild(back);
}

async function completeSetup() {
  const execUrl = document.getElementById('setup-exec').value.trim();
  const folderId = document.getElementById('setup-folder').value.trim();
  const author = document.getElementById('setup-author').value.trim();
  if (!execUrl) { toast('Apps Script URL is required', true); return; }
  if (!folderId) { toast('Drive folder ID is required', true); return; }
  STATE.config = { execUrl, folderId, author };
  saveConfig(STATE.config);
  document.getElementById('setup-modal')?.remove();
  await boot();
}

/* ────────────────────────────────────────────────────────────────
   BOOT
   ──────────────────────────────────────────────────────────────── */

async function boot() {
  document.getElementById('app').style.display = 'grid';
  setSaveStatus('saving', 'Loading…');
  try {
    await fetchAll();
    setSaveStatus('', 'Idle');
  } catch (e) {
    setSaveStatus('', 'Offline');
    toast('Could not reach backend: ' + e.message, true);
  }
  renderCounts();
  startPolling();

  // Wire nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.route));
  });

  navigate('products/all');
}

/* ────────────────────────────────────────────────────────────────
   UTILITIES
   ──────────────────────────────────────────────────────────────── */

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"]/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
function escapeAttr(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function cap(s) { return String(s || '').replace(/^\w/, c => c.toUpperCase()); }
function formatCategory(c) {
  const m = { 'leaded-rondel': 'Leaded · Rondel', 'leaded-leadlight': 'Leaded · Leadlight', 'mosaic': 'Mosaic' };
  return m[c] || c;
}
function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  } catch (e) { return ''; }
}

/* ────────────────────────────────────────────────────────────────
   START
   ──────────────────────────────────────────────────────────────── */

window.addEventListener('DOMContentLoaded', () => {
  STATE.config = loadConfig();
  if (!STATE.config || !STATE.config.execUrl) {
    showSetup();
  } else {
    boot();
  }
});
</script>
</body>
</html>
